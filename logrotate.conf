# Three Masters Bot — Log rotation
#
# Run manually:
#   logrotate --state /home/habil/three-masters-bot/logs/logrotate.state \
#             /home/habil/three-masters-bot/logrotate.conf
#
# Automate via crontab (run as habil):
#   crontab -e
#   0 3 * * * logrotate --state /home/habil/three-masters-bot/logs/logrotate.state /home/habil/three-masters-bot/logrotate.conf

/home/habil/three-masters-bot/logs/stdout.log {
    size 50M
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}

/home/habil/three-masters-bot/logs/three_masters.log {
    size 20M
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}

/home/habil/three-masters-bot/logs/watchdog.log {
    size 5M
    rotate 5
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
